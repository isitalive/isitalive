name: Dependency Audit

on:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # OIDC token for isitalive API
      pull-requests: write   # Post PR comment
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: isitalive/audit-action@102ba5f8a783b29e24a7203bafe3a753f22cf225 # main @ 2026-04-21
        with:
          fail-threshold: 20
