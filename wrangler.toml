name = "isitalive"
main = "src/index.ts"
compatibility_date = "2025-03-14"
compatibility_flags = ["nodejs_compat"]

# Build step — pre-renders static pages to public/ before deploy
[build]
command = "npm run build"

[placement]
mode = "smart"

# Module rules — import .md files as text
[[rules]]
type = "Text"
globs = ["**/*.md"]

# Custom domain
routes = [
  { pattern = "isitalive.dev", custom_domain = true }
]

# Workers KV — response cache
[[kv_namespaces]]
binding = "CACHE_KV"
id = "660634f39fe641c5b186ac3cb7259ead"

# Workers KV — API key store (create in CF dashboard, paste ID below)
[[kv_namespaces]]
binding = "KEYS_KV"
id = "8d18f5fa0e6046568eb3979c7a57b0eb"

# Native Rate Limiting — two-level infra protection (not billing)
# Note: CDN-Cache-Control does NOT prevent Worker invocations (ADR-006).
# Every request — anonymous or authenticated — wakes the Worker (~$0.30/M).
[[unsafe.bindings]]
name = "RATE_LIMITER_ANON"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }  # Tightened from 10 — ADR-006

[[unsafe.bindings]]
name = "RATE_LIMITER_AUTH"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 1000, period = 60 }


# Workflows — durable ingest pipeline
[[workflows]]
name = "ingest-workflow"
binding = "INGEST_WORKFLOW"
class_name = "IngestWorkflow"

[[workflows]]
name = "refresh-workflow"
binding = "REFRESH_WORKFLOW"
class_name = "RefreshWorkflow"

# R2 — data lake (Iceberg tables via R2 Data Catalog)
[[r2_buckets]]
binding = "DATA_BUCKET"
bucket_name = "isitalive-data"

# Pipelines — event streams → Iceberg tables (R2 Data Catalog)
[[pipelines]]
binding = "PROVIDER_PIPELINE"
pipeline = "d29d70a2629a476a8bfbf0251b914612"

[[pipelines]]
binding = "RESULT_PIPELINE"
pipeline = "2d6ee2810cdb4079a6d78468e6fccf65"

[[pipelines]]
binding = "USAGE_PIPELINE"
pipeline = "c0c9974a46f1409383bbe28e82fab329"

[[pipelines]]
binding = "MANIFEST_PIPELINE"
pipeline = "aceb9a448fc6426ca418d233579a5bc9"

# Cron Triggers — every 10 min aggregation + daily snapshot (6 AM UTC)
[triggers]
crons = ["*/10 * * * *", "0 6 * * *"]

# Secrets (set via Cloudflare dashboard → Settings → Variables and Secrets):
# - GITHUB_TOKEN: GitHub personal access token for API auth
# - TURNSTILE_SITE_KEY: Cloudflare Turnstile public key
# - TURNSTILE_SECRET_KEY: Cloudflare Turnstile secret key
# - CF_ACCOUNT_ID: Cloudflare account ID (for R2 SQL API in Cron)
# - CF_R2_SQL_TOKEN: Read-only scoped token for R2 SQL queries
#     → Create Custom Token: Account → R2 Data Catalog + R2 Storage + R2 SQL → Read

# Observability — logs and traces
[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true  # Log every invocation
head_sampling_rate = 0.1  # 10% sampling — reduce cost while retaining signal

[observability.traces]
enabled = true

# Static Assets (Phase 2 — ADR-006)
# Pre-rendered UI pages served WITHOUT invoking the Worker — free & unlimited.
# Build: npx tsx scripts/build-static.ts → public/
#
# Default behavior: if a request matches a static file, it's served directly
# (no Worker invocation). If no match, the Worker handles it.
# run_worker_first: paths where the Worker should run EVEN IF a static file matches.
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "none"