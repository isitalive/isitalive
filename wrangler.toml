name = "isitalive"
main = "src/index.ts"
compatibility_date = "2025-03-14"
compatibility_flags = ["nodejs_compat"]

# Build step — pre-renders static pages to public/ before deploy
[build]
command = "npm run build"

[placement]
mode = "smart"

# Module rules — import .md files as text
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

# Custom domain
routes = [
  { pattern = "isitalive.dev", custom_domain = true }
]

# Native Rate Limiting — two-level infra protection (not billing)
# Note: CDN-Cache-Control does NOT prevent Worker invocations (ADR-006).
# Every request — anonymous or authenticated — wakes the Worker (~$0.30/M).
[[unsafe.bindings]]
name = "RATE_LIMITER_ANON"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }  # Tightened from 10 — ADR-006

[[unsafe.bindings]]
name = "RATE_LIMITER_AUTH"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 50, period = 60 }

# Admin login brute-force protection — per-IP
[[unsafe.bindings]]
name = "RATE_LIMITER_ADMIN"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 10, period = 60 }


# Workflows — durable ingest pipeline
[[workflows]]
name = "ingest-workflow"
binding = "INGEST_WORKFLOW"
class_name = "IngestWorkflow"

[[workflows]]
name = "refresh-workflow"
binding = "REFRESH_WORKFLOW"
class_name = "RefreshWorkflow"


# D1 — operational state, hot analytics, and long-term rollups
[[d1_databases]]
binding = "DB"
database_name = "isitalive-db"
database_id = "f23c66f8-1690-4609-a4b7-beadc8c9bff1"
migrations_dir = "migrations"

# R2 — raw JSONL analytics archive
[[r2_buckets]]
binding = "DATA_BUCKET"
bucket_name = "isitalive-data"

# Queues — event ingestion with retry + DLQ
[[queues.producers]]
queue = "isitalive-events"
binding = "EVENT_QUEUE"

[[queues.consumers]]
queue = "isitalive-events"
max_batch_size = 100
max_batch_timeout = 30
max_retries = 5
dead_letter_queue = "isitalive-events-dlq"

# Cron Triggers — every 10 min aggregation + daily snapshot (6 AM UTC)
[triggers]
crons = ["*/10 * * * *", "0 6 * * *"]

# Public tokens — safe to commit (already embedded in HTML source).
# Available at runtime via env AND parsed by scripts/build-static.ts at build time.
# CF Web Analytics is set to "JS Snippet installation" — we embed the beacon manually.
[vars]
TURNSTILE_SITE_KEY = "0x4AAAAAACtWfG0E4_y8k0Dy"
CF_ANALYTICS_TOKEN = "c075f9d44e444ec099e35a6f1859a688"

# Secrets (set via Cloudflare dashboard → Settings → Variables and Secrets):
# - GITHUB_TOKEN: GitHub personal access token for API auth
# - TURNSTILE_SECRET_KEY: Cloudflare Turnstile secret key
[secrets]
required = [
  "GITHUB_TOKEN",
  "GITHUB_APP_ID",
  "GITHUB_PRIVATE_KEY",
  "GITHUB_WEBHOOK_SECRET",
  "TURNSTILE_SECRET_KEY",
  "ADMIN_SECRET",
]

# Observability — logs and traces
[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
head_sampling_rate = 0.1  # 10% — reduce cost while retaining signal

[observability.traces]
enabled = true
head_sampling_rate = 0.01  # 1% — traces produce many spans per request, keep tight

# Static Assets (Phase 2 — ADR-006)
# Pre-rendered UI pages served WITHOUT invoking the Worker — free & unlimited.
# Build: npx tsx scripts/build-static.ts → public/
#
# Default behavior: if a request matches a static file, it's served directly
# (no Worker invocation). If no match, the Worker handles it.
# run_worker_first: paths where the Worker should run EVEN IF a static file matches.
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "none"
