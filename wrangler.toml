name = "isitalive"
main = "src/index.ts"
compatibility_date = "2025-03-14"
compatibility_flags = ["nodejs_compat"]

# Custom domain
routes = [
  { pattern = "isitalive.dev", custom_domain = true }
]

# Workers KV — response cache
[[kv_namespaces]]
binding = "CACHE_KV"
id = "660634f39fe641c5b186ac3cb7259ead"

# Workers KV — API key store (create in CF dashboard, paste ID below)
[[kv_namespaces]]
binding = "KEYS_KV"
id = "8d18f5fa0e6046568eb3979c7a57b0eb"

# Durable Object — rate limiting
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiterDO"

# Durable Object — recent queries list
[[durable_objects.bindings]]
name = "RECENT_QUERIES"
class_name = "RecentQueriesDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiterDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RecentQueriesDO"]

# R2 — raw GitHub response archive (permanent source of truth)
[[r2_buckets]]
binding = "RAW_DATA"
bucket_name = "isitalive-raw"

# Pipelines — analytics events → R2 Iceberg table (default/checks)
[[pipelines]]
pipeline = "1bc79833401a4e438d2c3794d0a5565d"
binding = "ISITALIVE_CHECKS_STREAM"

# Cron Triggers — hourly trending + daily snapshot (6 AM UTC)
[triggers]
crons = ["0 * * * *", "0 6 * * *"]

# Secrets (set via Cloudflare dashboard → Settings → Variables and Secrets):
# - GITHUB_TOKEN: GitHub personal access token for API auth
# - TURNSTILE_SITE_KEY: Cloudflare Turnstile public key
# - TURNSTILE_SECRET_KEY: Cloudflare Turnstile secret key
# - CF_ACCOUNT_ID: Cloudflare account ID (for R2 SQL API in Cron)
# - CF_R2_SQL_TOKEN: Read-only scoped token for R2 SQL queries
#     → Create Custom Token: Account → R2 Data Catalog + R2 Storage + R2 SQL → Read

# Observability — logs and traces
[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true  # Log every invocation
head_sampling_rate = 1  # 100% sampling (reduce in prod if costs are high)

[observability.traces]
enabled = true