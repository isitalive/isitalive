name = "isitalive"
main = "src/index.ts"
compatibility_date = "2025-03-14"
compatibility_flags = ["nodejs_compat"]

# Module rules — import .md files as text
[[rules]]
type = "Text"
globs = ["**/*.md"]

# Custom domain
routes = [
  { pattern = "isitalive.dev", custom_domain = true }
]

# Workers KV — response cache
[[kv_namespaces]]
binding = "CACHE_KV"
id = "660634f39fe641c5b186ac3cb7259ead"

# Workers KV — API key store (create in CF dashboard, paste ID below)
[[kv_namespaces]]
binding = "KEYS_KV"
id = "8d18f5fa0e6046568eb3979c7a57b0eb"

# Native Rate Limiting (replaces Durable Objects)
[[unsafe.bindings]]
name = "RATE_LIMITER_FREE"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_PRO"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 120, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_ENTERPRISE"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 600, period = 60 }

[[migrations]]
tag = "v3"
deleted_classes = ["RateLimiterDO", "RecentQueriesDO"]

# Workflows — durable ingest pipeline
[[workflows]]
name = "ingest-workflow"
binding = "INGEST_WORKFLOW"
class_name = "IngestWorkflow"

[[workflows]]
name = "refresh-workflow"
binding = "REFRESH_WORKFLOW"
class_name = "RefreshWorkflow"

# R2 — raw GitHub response archive + analytics events
[[r2_buckets]]
binding = "RAW_DATA"
bucket_name = "isitalive-raw"

# Queues — unified event bus (recent queries, analytics, first-seen, archives)
[[queues.producers]]
binding = "EVENTS_QUEUE"
queue = "isitalive-events"

[[queues.consumers]]
queue = "isitalive-events"
max_batch_size = 100
max_batch_timeout = 5

# Cron Triggers — hourly trending + daily snapshot (6 AM UTC)
[triggers]
crons = ["*/10 * * * *", "0 6 * * *"]

# Secrets (set via Cloudflare dashboard → Settings → Variables and Secrets):
# - GITHUB_TOKEN: GitHub personal access token for API auth
# - TURNSTILE_SITE_KEY: Cloudflare Turnstile public key
# - TURNSTILE_SECRET_KEY: Cloudflare Turnstile secret key
# - CF_ACCOUNT_ID: Cloudflare account ID (for R2 SQL API in Cron)
# - CF_R2_SQL_TOKEN: Read-only scoped token for R2 SQL queries
#     → Create Custom Token: Account → R2 Data Catalog + R2 Storage + R2 SQL → Read

# Observability — logs and traces
[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true  # Log every invocation
head_sampling_rate = 1  # 100% sampling (reduce in prod if costs are high)

[observability.traces]
enabled = true